# paperadar — research interests config example
#
# Copy this file to:
#   $OBSIDIAN_VAULT_PATH/99_System/Config/research_interests.yaml
# (or pass an explicit path with --config)
#
# To inspect what's currently active, run:
#   python scripts/show_keywords.py
# To edit interactively, ask the agent (Claude Code / Codex):
#   "show my research interests" / "add a keyword".
#
# paperadar works for ANY field — the example domains below are a
# cross-disciplinary illustration (AI/ML, AI-for-science, statistics,
# economics). Replace them with your own topics; domain names are just labels.

# Output language: "en" or "zh"
language: "en"

# A free-text description of what you work on. This is the single most useful
# thing to set: the agent reads it to calibrate scoring, and writes it here on
# first run so it never has to ask again. One or two sentences is plenty, e.g.
#   "I study machine learning methods for protein structure and drug design."
research_brief: ""

# ─────────────────────────────────────────────────────────────────────────
# Output mode
# ─────────────────────────────────────────────────────────────────────────
# "obsidian"   — writes weekly notes + paper notes into an Obsidian vault,
#                with wikilinks ([[...]]) and image embeds. Requires vault_path.
# "standalone" — writes plain Markdown files (no wikilinks, no vault assumption)
#                into output_dir. Use this if you don't use Obsidian.
output:
  mode: "standalone"

  obsidian:
    # Required iff mode == "obsidian". Can also be set via $OBSIDIAN_VAULT_PATH
    # env var (env var wins if both are set).
    vault_path: ""
    daily_dir: "10_Daily"
    papers_dir: "20_Research/Papers"

  standalone:
    # Where plain-markdown weekly notes go. Tilde is expanded.
    output_dir: "~/paperadar-output"

# Semantic Scholar API key (optional — reduces rate limiting)
# Free key: https://www.semanticscholar.org/product/api#api-key
# semantic_scholar_api_key: "your-api-key-here"

# Zotero sync (optional — set ZOTERO_API_KEY + ZOTERO_USER_ID env vars to enable)
# (Keys are NOT stored in this YAML; use environment variables.)

# ─────────────────────────────────────────────────────────────────────────
# Sources
# ─────────────────────────────────────────────────────────────────────────
# Philosophy: every accessible source is searched, and what surfaces a paper is
# keyword relevance — NOT which site it came from. So a biophysics paper in
# PubMed can still reach a physicist. To make a topic matter more (or less),
# set its `priority` under research_domains below — not by switching sources off.

# Biomedical sources (bioRxiv, medRxiv, PubMed).
#   true   — always search them.
#   false  — never search them.
#   "auto" (default) — search them only when this config shows a biomedical signal
#            (a q-bio.* category or a biomedical keyword). This keeps clinical
#            results out of non-biomedical fields. Non-bio researchers who still
#            want PubMed coverage should set this to true.
bio_sources: "auto"

# OpenAlex (https://openalex.org) — ~270M works across ALL disciplines, with
# open-access PDFs and topic tags. Needs a free API key (30-second signup).
#   enabled: "auto"  — turn on only when OPENALEX_API_KEY is set in your env.
#            true     — turn on (skips cleanly if the key is missing).
#            false    — never query OpenAlex.
# Set the key (and optional contact email) in your shell, not here:
#   export OPENALEX_API_KEY="..."   # required
#   export OPENALEX_EMAIL="you@example.org"   # optional, faster "polite pool"
openalex:
  enabled: "auto"
  max_results: 100

# Crossref (https://www.crossref.org) — the DOI registry of record, ~180M works
# across every field. No API key needed, and it catches freshly-registered
# papers fast, often before aggregators index them. Abstracts are present for a
# subset of records.
#   enabled: "auto"  — on by default (no key required).
#            false    — turn it off.
# Optional: export CROSSREF_EMAIL="you@example.org" for the faster polite pool
# (paperadar also reuses UNPAYWALL_EMAIL if that is already set).
crossref:
  enabled: "auto"
  max_results: 100

# CORE (https://core.ac.uk) — ~400M open-access works harvested from
# institutional and subject repositories (theses, working papers, deposits),
# with full-text abstracts and PDF links. Needs a free API key.
#   enabled: "auto"  — turn on only when CORE_API_KEY is set in your env.
#            false    — never query CORE.
#   export CORE_API_KEY="..."   # get one at https://core.ac.uk/services/api
# Opt-in (default off): CORE surfaces recently-*indexed* but not recently-
# *published* works, so it rarely changes a weekly top-N while adding fetch
# latency. Set enabled: "auto" or true (plus a key) if you want its OA coverage.
core:
  enabled: false
  max_results: 100

# ─────────────────────────────────────────────────────────────────────────
# Scoring (advanced — optional)
# ─────────────────────────────────────────────────────────────────────────
# The defaults below are already tuned; uncomment `scoring:` and edit only to
# change how papers are filtered and ranked. The values shown ARE the built-in
# defaults, so leaving this commented behaves exactly as before. Any field you
# omit keeps its default; any unparseable value falls back to it.
# scoring:
#   min_relevance: 0.5        # inclusion gate — keyword strength a paper needs
#                             # to appear at all (lower = looser, more papers)
#   min_keyword_matches: 2    # require >=2 distinct keyword hits OR >=1 compound
#                             # keyword (e.g. "transposable element", "single-cell")
#                             # to be included; blocks single ambiguous words like
#                             # "alignment"/"simulation". Set 1 for the old behaviour.
#   title_match: 0.5          # score for a keyword found in the title
#   abstract_match: 0.3       # score for a keyword found only in the abstract
#   category_match: 1.0       # score for an arXiv-category match
#   weights:                  # final-ranking blend for ordinary papers
#     relevance: 0.50         # (auto-normalized if they don't sum to 1)
#     recency: 0.15
#     popularity: 0.25
#     quality: 0.10
#   recency_thresholds:       # [days_since_publish, score] buckets
#     - [30, 3.0]
#     - [90, 2.0]
#     - [180, 1.0]

# ─────────────────────────────────────────────────────────────────────────
# Relevance rerank (agent precision pass)
# ─────────────────────────────────────────────────────────────────────────
# search_arxiv.py emits a candidate pool (CLI: --pool-size, default 25). When an
# agent runs the skill, SKILL.md Step 2.7 has it judge each candidate against
# `research_brief` and keep the on-target ones (off-target are dropped). The
# keyword gate is recall-first by default (scoring.min_keyword_matches: 1); set
# it to 2 for a stricter deterministic filter on headless/no-agent runs.

# ─────────────────────────────────────────────────────────────────────────
# Top-tier journal filter
# ─────────────────────────────────────────────────────────────────────────
# When set, PubMed and Semantic Scholar results are RESTRICTED to these
# venues. Preprints (arXiv / bioRxiv / medRxiv) are always included.
# Leave empty (or omit) to disable the filter. Mix journals and conferences
# to taste; use exact PubMed names / NLM abbreviations for PubMed matches.
prioritize_journals:
  - "Nature"
  - "Science"
  - "Cell"
  - "Nature Methods"
  - "Nature Communications"
  - "Proc Natl Acad Sci U S A"     # PNAS (NLM abbreviation)
  - "Science Advances"
  - "eLife"
  - "Physical Review Letters"
  - "Physical Review X"
  - "Journal of Machine Learning Research"
  - "NeurIPS"
  - "ICML"
  - "ICLR"

# ─────────────────────────────────────────────────────────────────────────
# Research domains
# ─────────────────────────────────────────────────────────────────────────
# EXAMPLE domains showing the structure — replace with your own. Domain names
# are arbitrary labels. `priority` (1–5, where 3 is neutral) weights how a
# matched paper RANKS: a priority-5 topic's matches rise to the top, a
# priority-1 topic's sink — it does not exclude anything, it reorders.
# `arxiv_categories` both controls which arXiv papers are fetched (paperadar
# uses the union of all categories below) and adds a relevance boost on a match.
research_domains:

  "AI & Machine Learning":
    keywords:
      - "deep learning"
      - "large language model"
      - "foundation model"
      - "reinforcement learning"
      - "representation learning"
      - "transformer"
      - "diffusion model"
    arxiv_categories:
      - "cs.LG"
      - "cs.AI"
      - "cs.CL"
      - "cs.CV"
    priority: 5

  "AI for Science":
    keywords:
      - "scientific discovery"
      - "neural operator"
      - "physics-informed"
      - "molecular design"
      - "materials discovery"
      - "climate modeling"
      - "surrogate model"
    arxiv_categories:
      - "cs.LG"
      - "physics.comp-ph"
      - "cond-mat.mtrl-sci"
      - "stat.ML"
    priority: 4

  "Statistics & Causal Inference":
    keywords:
      - "causal inference"
      - "Bayesian inference"
      - "variational inference"
      - "uncertainty quantification"
      - "conformal prediction"
      - "experimental design"
    arxiv_categories:
      - "stat.ML"
      - "stat.ME"
      - "math.ST"
    priority: 3

  "Computational Economics":
    keywords:
      - "mechanism design"
      - "auction theory"
      - "game theory"
      - "market design"
      - "algorithmic economics"
    arxiv_categories:
      - "econ.GN"
      - "cs.GT"
    priority: 2

  # Uncomment and adapt if your work is biology-related — note the q-bio.*
  # categories, which also flip bio_sources on under "auto".
  # "Computational Biology":
  #   keywords:
  #     - "single-cell"
  #     - "genomics"
  #     - "gene regulation"
  #     - "protein structure"
  #   arxiv_categories:
  #     - "q-bio.QM"
  #     - "q-bio.GN"
  #   priority: 3

# Excluded keywords — papers whose title/abstract contain any of these are filtered
# out (substring match). Default is just "workshop". "review"/"survey" are
# STEM-centric and wrongly drop social-science work (a policy "review", a household
# "survey"), so add them only if your field wants those gone:
#   - "review"
#   - "survey"
excluded_keywords:
  - "workshop"

# Optional: extra words to skip during automatic wikilink keyword linking
# extra_common_words:
#   - "dataset"
#   - "results"
